<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Waum 5원소 자기탐구</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ECE9E6;
    --card:#FFFFFF;
    --ink:#5A4F4B;
    --ink-soft:#8D8581;
    --muted:#AAA4A0;
    --line:#DAD7D3;
    --sage:#61756D;
    --sage-deep:#46524D;
    --sage-soft:#D3D4D0;
    --sage-soft-border:#BBC0BC;
    --tan:#C19B71;
    --tan-deep:#735D46;
    --tan-soft:#E3D8CC;
    --tan-soft-border:#D9C6B1;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    font-family:'Noto Sans KR',sans-serif;
    color:var(--ink);
    min-height:100vh;
    display:flex;
    justify-content:center;
  }
  #app{
    width:100%;
    max-width:460px;
    min-height:100vh;
    background:var(--bg);
    display:flex;
    flex-direction:column;
    position:relative;
  }
  .screen{ display:none; flex-direction:column; flex:1; padding:32px 24px 40px; }
  .screen.active{ display:flex; }

  .mark{ font-family:'Noto Serif KR',serif; font-size:14px; letter-spacing:0.3em; color:var(--sage-deep); text-align:center; margin-bottom:8px;}

  /* intro */
  #screen-intro{ align-items:center; justify-content:center; text-align:center; }
  .breathe{
    width:140px;height:140px;border-radius:50%;
    border:1px solid var(--sage);
    display:flex;align-items:center;justify-content:center;
    margin:26px 0 30px; position:relative;
  }
  .breathe::before{ content:'';position:absolute;inset:18px;border-radius:50%;border:1px solid var(--sage);opacity:0.55; }
  .breathe::after{ content:'';position:absolute;inset:38px;border-radius:50%;background:var(--sage);opacity:0.12; }
  #screen-intro h1{ font-family:'Noto Serif KR',serif; font-weight:500; font-size:23px; line-height:1.55; margin:0 0 10px; }
  #screen-intro p.sub{ font-size:13px; color:var(--ink-soft); line-height:1.7; margin:0 0 28px; }
  .field{
    width:100%; border:none; border-bottom:1px solid var(--line);
    background:transparent; text-align:center; font-size:15px; padding:10px 0;
    color:var(--ink); font-family:'Noto Sans KR',sans-serif;
  }
  .field::placeholder{ color:var(--muted); }
  .field:focus{ outline:none; border-bottom-color:var(--sage); }
  .btn-primary{
    margin-top:28px; width:100%; padding:14px; border:none; border-radius:4px;
    background:var(--sage-deep); color:var(--bg); font-size:14px; letter-spacing:0.05em;
    font-family:'Noto Sans KR',sans-serif; cursor:pointer;
  }
  .btn-primary:disabled{ opacity:0.4; cursor:default; }
  .btn-outline{
    width:100%; padding:13px; border-radius:4px; border:1px solid var(--sage-deep);
    background:transparent; color:var(--sage-deep); font-size:14px; font-family:'Noto Sans KR',sans-serif;
    display:flex; align-items:center; justify-content:center; gap:8px; cursor:pointer;
  }
  .btn-text{ background:none;border:none;font-size:13px;color:var(--ink-soft); padding:8px 4px; cursor:pointer; font-family:'Noto Sans KR',sans-serif; }

  /* survey */
  .chapters{ display:flex; justify-content:space-between; margin-bottom:6px; }
  .chapter-dot-wrap{ display:flex; flex-direction:column; align-items:center; gap:6px; flex:1;}
  .dot{ width:10px;height:10px;border-radius:50%;background:var(--line); transition:background .2s,width .2s,height .2s; }
  .dot.active{ background:var(--sage-deep); width:12px; height:12px; }
  .dot.done{ background:var(--sage); }
  .chapter-label{ font-size:10px; color:var(--muted); }
  .chapter-label.active{ color:var(--sage-deep); font-weight:500; }
  .chapter-title{ font-family:'Noto Serif KR',serif; font-size:19px; font-weight:500; margin:22px 0 4px; }
  .q-count{ font-size:12px; color:var(--muted); margin-bottom:22px; }
  .question-card{
    background:var(--card); border-radius:14px; padding:24px 20px; border:1px solid var(--line);
    flex:1; display:flex; flex-direction:column; justify-content:space-between;
  }
  .q-text{ font-size:16px; line-height:1.75; margin:0 0 26px; }
  .scale-row{ display:flex; justify-content:space-between; align-items:center; }
  .scale-opt{
    width:38px;height:38px;border-radius:50%;border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--muted);
    background:none; cursor:pointer; font-family:'Noto Sans KR',sans-serif;
  }
  .scale-opt.sel{ border-color:var(--sage-deep); color:var(--sage-deep); font-weight:500; background:var(--sage-soft); }
  .scale-caption{ display:flex; justify-content:space-between; font-size:10px; color:var(--muted); margin-top:10px; }
  .nav-row{ display:flex; justify-content:space-between; margin-top:22px; }

  /* result / radar */
  #screen-result{ align-items:center; }
  .s3-title{ font-family:'Noto Serif KR',serif; font-size:19px; font-weight:500; margin:0 0 4px; text-align:center; }
  .s3-sub{ font-size:12px; color:var(--muted); text-align:center; margin:0 0 6px; }
  .legend{ display:flex; gap:20px; justify-content:center; margin-top:8px; }
  .legend-item{ display:flex; align-items:center; gap:6px; font-size:11px; color:var(--ink-soft); }
  .legend-swatch{ width:10px;height:10px;border-radius:50%; }

  /* report */
  .s4-eyebrow{ font-size:11px; letter-spacing:0.1em; color:var(--muted); margin-bottom:6px; }
  .s4-title{ font-family:'Noto Serif KR',serif; font-size:21px; font-weight:500; margin:0 0 4px; }
  .s4-desc{ font-size:13px; color:var(--ink-soft); line-height:1.7; margin:0 0 22px; }
  .msg-card{ border-radius:14px; padding:20px; margin-bottom:14px; }
  .msg-card.stable{ background:var(--sage-soft); border:1px solid var(--sage-soft-border); }
  .msg-card.unstable{ background:var(--tan-soft); border:1px solid var(--tan-soft-border); }
  .msg-eyebrow{ font-size:11px; font-weight:500; margin-bottom:8px; letter-spacing:0.03em; }
  .msg-card.stable .msg-eyebrow{ color:var(--sage-deep); }
  .msg-card.unstable .msg-eyebrow{ color:var(--tan-deep); }
  .msg-body{ font-size:14px; line-height:1.75; margin:0; color:var(--ink); }
  .remedy-chip{
    display:inline-flex; align-items:center; gap:6px; margin-top:12px;
    font-size:12px; padding:6px 12px; border-radius:20px; background:#fff;
  }
  .remedy-chip.stable{ color:var(--sage-deep); border:1px solid var(--sage-soft-border); }
  .remedy-chip.unstable{ color:var(--tan-deep); border:1px solid var(--tan-soft-border); }
  .footer-note{ font-size:11px; color:var(--muted); line-height:1.7; margin-top:8px; text-align:center; }
  .concern-section-title{ font-family:'Noto Serif KR',serif; font-size:15px; font-weight:500; margin:26px 0 12px; color:var(--ink); }

  /* save */
  #screen-save{ align-items:center; }
  .s5-title{ font-family:'Noto Serif KR',serif; font-size:18px; font-weight:500; margin:0 0 18px; text-align:center; }
  #capture-target{
    width:100%; border-radius:14px; overflow:hidden; border:1px solid var(--line);
    background:var(--card); margin-bottom:22px;
  }
  #capture-target .top{ background:var(--sage-deep); padding:22px; text-align:center; }
  #capture-target .top .name{ font-family:'Noto Serif KR',serif; color:var(--bg); font-size:14px; }
  #capture-target .top .dosha{ font-family:'Noto Serif KR',serif; color:var(--bg); font-size:21px; margin-top:6px; }
  #capture-target .body-inner{ padding:18px 20px; }
  #capture-target .bottom{ padding:14px 18px; font-size:11px; color:var(--muted); text-align:center; border-top:1px solid var(--line); }
  .save-note{ font-size:11px; color:var(--muted); margin-top:14px; text-align:center; line-height:1.6; }
</style>
</head>
<body>
<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
/* ============ 데이터 ============ */

var ELEMENTS = [
  { id:'ether', name:'공간', color:'sage-soft-border', desc:'마음의 여백과 자유' },
  { id:'air',   name:'바람', color:'sage',             desc:'가벼운 움직임과 변화' },
  { id:'fire',  name:'불',   color:'tan-deep',          desc:'뜨거운 열기와 성취' },
  { id:'water', name:'물',   color:'tan',               desc:'촉촉한 생기와 감성적 공감' },
  { id:'earth', name:'흙',   color:'ink',               desc:'단단한 뿌리와 안정' }
];

/* 원소 -> 도샤 매핑 (최종 확정본, 점수 계산용) */
var ELEMENT_TO_DOSHA = {
  ether:'Vata', air:'Vata',
  fire:'Pitta', water:'Pitta',
  earth:'Kapha'
};

/* 원소별 자기공명 명상 대상: 불균형이 감지된 원소는 같은 원소의 자연 대상과 연결하면
   저절로 비워지고 채워지며 균형을 찾는다는 전제 */
var ELEMENT_REMEDY = {
  ether:'텅 빈 하늘',
  air:'바람에 흔들리는 나뭇잎',
  fire:'태양의 빛',
  water:'맑은 물',
  earth:'대지의 바위'
};

/* 체질(도샤) 전통 구성 원소: 주 원소 + 보조 원소 (점수 계산과는 별개로, 처방 표현에만 사용) */
var DOSHA_CONSTITUTION_ELEMENTS = {
  Vata:  { primary:'air',  secondary:'ether' },
  Pitta: { primary:'fire', secondary:'water' },
  Kapha: { primary:'earth', secondary:'water' }
};

var QUESTIONS = [
  { id:1,  element:'ether', type:'P', weight:2, text:'평소 나는 말할 때 핵심만 짚기보다 넓은 맥락을 포괄하려 하는가?' },
  { id:2,  element:'ether', type:'P', weight:2, text:'나는 탁 트인 넓은 곳에서 내 존재가 확장되는 자유를 느끼는가?' },
  { id:3,  element:'ether', type:'P', weight:2, text:'평소 나는 현실의 구체적 사건보다 우주적, 철학적 상상을 즐기는가?' },
  { id:4,  element:'ether', type:'P', weight:3, text:'나의 내면에는 생각이 머물 수 있는 넉넉한 여백이 존재하는가?' },
  { id:5,  element:'ether', type:'V', weight:1, text:'요즘 내 마음이 너무 많은 정보로 차 있어 여유 공간이 없는가?',
    insight:'생각이 쉴 자리를 잃고, 사소한 자극에도 쉽게 압도됩니다.' },
  { id:6,  element:'ether', type:'V', weight:1, text:'최근 외부의 자극이 내면의 고요한 공간을 침범하여 피로한가?',
    insight:'내면의 고요를 지키지 못해 작은 소음에도 쉽게 지칩니다.' },
  { id:7,  element:'ether', type:'V', weight:1, text:'지금 내면에서 나 자신을 담을 수 있는 충분한 공간을 느끼는가?',
    reverse:true, insight:'시야가 좁아지고 여유를 느끼기 어려워집니다.' },
  { id:8,  element:'ether', type:'V', weight:1, text:'최근 들어 나만의 고요한 시간을 갖지 못해 에너지가 메마른가?',
    insight:'혼자만의 시간이 사라지면서 채워지지 않는 갈증이 쌓입니다.' },

  { id:9,  element:'air', type:'P', weight:3, text:'평소 나는 걸음걸이가 빠르고 움직임이 분주한 편인가?' },
  { id:10, element:'air', type:'P', weight:2, text:'평소 나는 결정이 빠르지만 그만큼 마음도 쉽게 바뀌는가?' },
  { id:11, element:'air', type:'P', weight:2, text:'나는 새로운 변화를 누구보다 빠르게 받아들이는가?' },
  { id:12, element:'air', type:'P', weight:3, text:'평소 나는 마르고 체중이 쉽게 늘지 않는 체질인가?' },
  { id:13, element:'air', type:'V', weight:1, text:'최근 들어 깊은 잠을 이루지 못하고 생각이 이어지는가?',
    insight:'머릿속 생각이 멈추지 않아 몸이 쉬어도 마음은 쉬지 못합니다.' },
  { id:14, element:'air', type:'V', weight:1, text:'최근 들어 유독 손발이 차고 에너지가 굳어있는 느낌인가?',
    insight:'에너지가 순환하지 못하고 몸 끝이 차갑게 굳어갑니다.' },
  { id:15, element:'air', type:'V', weight:2, text:'지금 내 마음이 불안하고 갈 곳을 잃은 듯 안절부절하는가?',

  { id:16, element:'air', type:'V', weight:1, text:'요즘 소화가 더디고 배에 가스가 자주 차는가?',
    insight:'몸속 흐름이 정체되어 답답함이 쌓입니다.' },

  { id:17, element:'fire', type:'P', weight:3, text:'나는 목표가 생기면 그 끝을 볼 때까지 강렬히 몰입하는가?' },
  { id:18, element:'fire', type:'P', weight:3, text:'평소 나는 매사에 정확하고 완벽함을 추구하는 성격인가?' },
  { id:19, element:'fire', type:'P', weight:2, text:'평소 나는 추위보다 더위를 더 타는 편인가?' },
  { id:20, element:'fire', type:'P', weight:3, text:'평소 나의 소화력은 강하고 식사 시간을 잘 지키는가?' },
  { id:21, element:'fire', type:'V', weight:2, text:'최근 나도 모르게 쉽게 화가 나고 분노가 끓어오르는가?',
    insight:'작은 자극에도 감정이 확 타올라 스스로를 태웁니다.' },
  { id:22, element:'fire', type:'V', weight:1, text:'최근 들어 눈이 충혈되거나 입안이 자주 마르는가?',
    insight:'몸속 열기가 위로 올라와 눈과 입이 메마릅니다.' },
  { id:23, element:'fire', type:'V', weight:1, text:'최근 속쓰림이나 열감이 가슴으로 올라오는 것을 느끼는가?',
    insight:'소화되지 못한 열이 가슴까지 치밀어 오릅니다.' },
  { id:24, element:'fire', type:'V', weight:1, text:'요즘 들어 매사에 경쟁적이고 날카로운 태도를 보이는가?',
    insight:'여유를 잃고 주변 모두를 경쟁 상대로 느끼게 됩니다.' },

  { id:25, element:'water', type:'P', weight:2, text:'평소 나는 타인의 아픔에 깊이 공감하고 배려하는가?' },
  { id:26, element:'water', type:'P', weight:2, text:'평소 나의 피부는 생기가 돌고 촉촉한 편인가?' },
  { id:27, element:'water', type:'P', weight:2, text:'평소 나는 매사에 서두르지 않고 유연하고 여유로운가?' },
  { id:28, element:'water', type:'P', weight:2, text:'나는 한번 맺은 관계를 진심으로 소중히 여기는가?' },
  { id:29, element:'water', type:'V', weight:1, text:'최근 나의 감정 기복이 심하고 눈물이 많아졌는가?',
    insight:'감정이 파도처럼 오르내려 스스로도 예측하기 어려워집니다.' },
  { id:30, element:'water', type:'V', weight:1, text:'최근 몸이 무겁고 수분이 정체된 듯 붓는 느낌인가?',
    insight:'수분이 흐르지 못하고 고여 몸이 무겁게 가라앉습니다.' },
  { id:31, element:'water', type:'V', weight:1, text:'과도한 감정적 이입으로 인해 깊은 피로를 느끼는가?',
    insight:'타인의 감정을 너무 깊이 받아들여 나 자신이 지칩니다.' },
  { id:32, element:'water', type:'V', weight:1, text:'요즘 나도 모르게 관계에 대한 집착이 커진 것은 아닌가?',
    insight:'관계를 놓지 못하고 붙잡으려는 마음이 커집니다.' },

  { id:33, element:'earth', type:'P', weight:3, text:'평소 나는 변화보다는 안정적인 일상을 더 선호하는가?' },
  { id:34, element:'earth', type:'P', weight:3, text:'평소 나의 골격은 튼튼하고 안정적인 체형인가?' },
  { id:35, element:'earth', type:'P', weight:2, text:'평소 나는 경험을 오래 기억하고 차분히 정리하는가?' },
  { id:36, element:'earth', type:'P', weight:2, text:'평소 나는 체중이 잘 늘고 쉽게 빠지지 않는 편인가?' },
  { id:37, element:'earth', type:'V', weight:2, text:'최근 들어 아침에 몸이 무겁고 기상하기가 힘든가?',
    insight:'몸이 무겁게 가라앉아 하루를 시작할 힘을 내기 어렵습니다.' },
  { id:38, element:'earth', type:'V', weight:2, text:'요즘 모든 일이 귀찮고 깊은 무기력함에 머물러 있는가?',
    insight:'모든 일이 버겁게 느껴지고 움직이려는 의지가 사라집니다.' },
  { id:39, element:'earth', type:'V', weight:1, text:'최근 나태함이 커져 일을 자꾸 뒤로 미루고 있는가?',
    insight:'해야 할 일을 자꾸 다음으로 미루며 정체가 쌓입니다.' },
  { id:40, element:'earth', type:'V', weight:1, text:'최근 몸에 노폐물이 쌓이고 정체된 느낌을 받는가?',
    insight:'몸속에 정체된 노폐물이 쌓여 무겁고 둔한 느낌이 커집니다.' }
];

var DOSHA_DATA = {
  Vata:        { name:'바타(Vata)',           stable:'창의적이고 직관적임',         unstable:'불안하고 산만해짐',           remedy:'대지의 바위' },
  Pitta:       { name:'피타(Pitta)',          stable:'명석하고 추진력이 강함',       unstable:'분노가 많고 공격적임',        remedy:'고요한 호수' },

var DOSHA_COMPOUND_THRESHOLD = 12; /* 1,2위 % 차이가 이 값 이하면 복합 타입으로 판정 */

/* ============ 상태 ============ */

var state = {
  name:'',
  answers:{}, /* questionId -> 1~5 */

  questionIndexInChapter:0
};

var CHAPTER_ORDER = ['ether','air','fire','water','earth'];

function questionsOfElement(elId){
  return QUESTIONS.filter(function(q){ return q.element === elId; });
}

/* 받침 유무에 따라 조사를 자동으로 붙이기 위한 헬퍼 */
function hasBatchim(str){
  if (!str) return false;
  var lastChar = str.charAt(str.length - 1);
  var code = lastChar.charCodeAt(0) - 0xAC00;
  if (code < 0 || code > 11171) return false;
  return (code % 28) !== 0;
}
function eulReul(w){ return hasBatchim(w) ? '을' : '를'; }
function eunNeun(w){ return hasBatchim(w) ? '은' : '는'; }
function gwaWa(w){ return hasBatchim(w) ? '과' : '와'; }
function iGa(w){ return hasBatchim(w) ? '이' : '가'; }

/* ============ 계산 로직 ============ */

function effectiveAnswer(q){
  var raw = state.answers[q.id];
  if (!raw) return 0;
  return q.reverse ? (6 - raw) : raw;
}

function computeElementMax(elId, type){
  var qs = questionsOfElement(elId).filter(function(q){ return q.type === type; });
  var sum = 0;
  qs.forEach(function(q){ sum += q.weight * 5; });
  return sum;
}

function computeElementScore(elId, type){
  var qs = questionsOfElement(elId).filter(function(q){ return q.type === type; });
  var sum = 0;
  qs.forEach(function(q){
    sum += effectiveAnswer(q) * q.weight;
  });
  return sum;
}

function topConcernQuestion(elId){
  var qs = questionsOfElement(elId).filter(function(q){ return q.type === 'V' && state.answers[q.id]; });
  if (qs.length === 0) return null;
  return qs.slice().sort(function(a,b){ return effectiveAnswer(b) - effectiveAnswer(a); })[0];
}

function computeElementStats(elId){
  var pScore = computeElementScore(elId,'P');
  var vScore = computeElementScore(elId,'V');
  var pMax = computeElementMax(elId,'P');
  var vMax = computeElementMax(elId,'V');
  var pPercent = pMax > 0 ? (pScore / pMax * 100) : 0;
  var vPercent = vMax > 0 ? (vScore / vMax * 100) : 0;
  return {
    pScore:pScore, vScore:vScore, pMax:pMax, vMax:vMax,
    pPercent:pPercent, vPercent:vPercent,
    diff: pPercent - vPercent
  };
}

var ELEMENT_STATE_THRESHOLD = 10; /* diff(P%-V%)가 이 값보다 크면 안정, 작으면(음수) 불안정, 그 사이는 균형 */

function elementStateLabel(diff){
  if (diff > ELEMENT_STATE_THRESHOLD) return 'stable';
  if (diff < -ELEMENT_STATE_THRESHOLD) return 'unstable';
  return 'neutral';
}

function computeResults(){
  var elementStats = {};
  CHAPTER_ORDER.forEach(function(elId){
    elementStats[elId] = computeElementStats(elId);
  });

  /* 도샤별 P% 산출 (바타=공간+바람, 피타=불+물, 카파=흙) */
  var doshaPMax = {
    Vata: elementStats.ether.pMax + elementStats.air.pMax,
    Pitta: elementStats.fire.pMax + elementStats.water.pMax,
    Kapha: elementStats.earth.pMax
  };
  var doshaPScore = {
    Vata: elementStats.ether.pScore + elementStats.air.pScore,
    Pitta: elementStats.fire.pScore + elementStats.water.pScore,
    Kapha: elementStats.earth.pScore
  };
  var doshaPercent = {
    Vata: doshaPScore.Vata / doshaPMax.Vata * 100,
    Pitta: doshaPScore.Pitta / doshaPMax.Pitta * 100,
    Kapha: doshaPScore.Kapha / doshaPMax.Kapha * 100
  };

  var ranked = ['Vata','Pitta','Kapha'].sort(function(a,b){
    return doshaPercent[b] - doshaPercent[a];
  });
  var top = ranked[0], second = ranked[1], third = ranked[2];
  var gapTopSecond = doshaPercent[top] - doshaPercent[second];
  var gapSecondThird = doshaPercent[second] - doshaPercent[third];

  var doshaKey;
  if (gapTopSecond <= DOSHA_COMPOUND_THRESHOLD && gapSecondThird <= DOSHA_COMPOUND_THRESHOLD){
    doshaKey = 'VPK_Balance';
  } else if (gapTopSecond <= DOSHA_COMPOUND_THRESHOLD){
    var pair = [top, second].sort();
    if (pair.indexOf('Vata') > -1 && pair.indexOf('Pitta') > -1) doshaKey = 'Vata_Pitta';
    else if (pair.indexOf('Vata') > -1 && pair.indexOf('Kapha') > -1) doshaKey = 'Vata_Kapha';
    else doshaKey = 'Pitta_Kapha';
  } else {
    doshaKey = top;
  }

  /* 안정/불안정 원소 (P%-V% 차이 기준) */
  var elIds = CHAPTER_ORDER.slice();
  var stableElId = elIds.slice().sort(function(a,b){ return elementStats[b].diff - elementStats[a].diff; })[0];
  var unstableElId = elIds.slice().sort(function(a,b){ return elementStats[a].diff - elementStats[b].diff; })[0];

  var stableDoshaKey = ELEMENT_TO_DOSHA[stableElId];
  var unstableDoshaKey = ELEMENT_TO_DOSHA[unstableElId];
  var concernList = computeConcernList(elementStats);

  return {
    elementStats: elementStats,
    doshaPercent: doshaPercent,
    doshaKey: doshaKey,
    stableElId: stableElId,
    unstableElId: unstableElId,
    stableDoshaKey: stableDoshaKey,
    unstableDoshaKey: unstableDoshaKey,
    concernList: concernList
  };
}

/* 5원소 탐구 전체에서 강하게(4점 이상) 나타난 불균형 원소들을 모아 정리 */
function computeConcernList(elementStats){
  var list = [];
  CHAPTER_ORDER.forEach(function(elId){
    var q = topConcernQuestion(elId);
    if (q && effectiveAnswer(q) >= 4){
      list.push({
        elId: elId,
        name: elName(elId),
        insight: q.insight,
        remedy: ELEMENT_REMEDY[elId]
      });
    }
  });
  return list;
}

/* 체질(도샤)에 동조되는 자연 명상 추천 문구 생성 */
function constitutionRemedyText(doshaKey){
  if (doshaKey === 'VPK_Balance'){
    return '다섯 원소 모두와 고르게 연결되는 통합 자연 명상을 추천합니다.';
  }
  if (DOSHA_CONSTITUTION_ELEMENTS[doshaKey]){
    var pair = DOSHA_CONSTITUTION_ELEMENTS[doshaKey];
    var primaryRemedy = ELEMENT_REMEDY[pair.primary];
    var secondaryRemedy = ELEMENT_REMEDY[pair.secondary];
    return primaryRemedy + eulReul(primaryRemedy) + ' 주 명상 대상으로, ' + secondaryRemedy + eulReul(secondaryRemedy) + ' 보조로 삼아 연결해보세요.';
  }
  /* 복합 타입: 두 도샤의 주 원소를 함께 추천 */
  var doshaParts = doshaKey.split('_');
  var remedies = doshaParts.map(function(d){
    return ELEMENT_REMEDY[DOSHA_CONSTITUTION_ELEMENTS[d].primary];
  });
  return remedies[0] + gwaWa(remedies[0]) + ' ' + remedies[1] + iGa(remedies[1]) + ' 함께 어우러진 명상을 추천합니다.';
}

function renderSurveyInner(){
  var elId = CHAPTER_ORDER[state.chapterIndex];
  var qs = questionsOfElement(elId);
  var q = qs[state.questionIndexInChapter];
  var globalIndex = QUESTIONS.indexOf(q) + 1;
  var currentAnswer = state.answers[q.id];

  var scaleHTML = '<div class="scale-row">' + [1,2,3,4,5].map(function(v){
    var sel = currentAnswer === v ? ' sel' : '';
    return '<button class="scale-opt' + sel + '" data-value="' + v + '">' + v + '</button>';
  }).join('') + '</div>';

  var html =
    chapterDotsHTML(state.chapterIndex) +
    '<div class="chapter-title">' + elName(elId) + '</div>' +

      '<div>' +
        '<p class="q-text">' + q.text + '</p>' +
        scaleHTML +

      '</div>' +

      '<button id="prev-btn" class="btn-text">이전</button>' +
      '<button id="next-btn" class="btn-text" style="color:var(--sage-deep);font-weight:500;" ' + (currentAnswer ? '' : 'disabled') + '>' +
        (isLastQuestionOfChapter() ? '원소 정리 보기 →' : '다음 →') +
      '</button>' +
    '</div>';

  document.getElementById('survey-inner').innerHTML = html;
  bindSurveyEvents();
}

function isLastQuestionOfChapter(){
  var elId = CHAPTER_ORDER[state.chapterIndex];
  return state.questionIndexInChapter === questionsOfElement(elId).length - 1;
}

function isFirstQuestion(){
  return state.chapterIndex === 0 && state.questionIndexInChapter === 0;
}

function goNext(){
  var elId = CHAPTER_ORDER[state.chapterIndex];
  var qs = questionsOfElement(elId);
  if (state.questionIndexInChapter < qs.length - 1){
    state.questionIndexInChapter++;
    renderSurveyInner();
  } else {
    showBridge(elId);
  }
}

function goPrev(){
  if (isFirstQuestion()) return;
  if (state.questionIndexInChapter > 0){
    state.questionIndexInChapter--;
  } else {
    state.chapterIndex--;
    state.questionIndexInChapter = questionsOfElement(CHAPTER_ORDER[state.chapterIndex]).length - 1;
  }
  renderSurveyInner();
}

function bindSurveyEvents(){
  var opts = document.querySelectorAll('.scale-opt');
  opts.forEach(function(btn){
    btn.addEventListener('click', function(){
      var elId = CHAPTER_ORDER[state.chapterIndex];
      var qs = questionsOfElement(elId);
      var q = qs[state.questionIndexInChapter];
      state.answers[q.id] = parseInt(btn.getAttribute('data-value'), 10);
      renderSurveyInner();
    });
  });
  var next = document.getElementById('next-btn');
  if (next) next.addEventListener('click', goNext);
  var prev = document.getElementById('prev-btn');
  if (prev) prev.addEventListener('click', goPrev);
}

function finishSurvey(){
  window.results = computeResults();
  renderRadar(window.results);
  renderReport(window.results);
  renderSaveScreen(window.results);
  showScreen('result');
}

  var html =

    '</div>' +

      (isLastChapter ? '결과 보기 →' : '다음 원소로 →') +
    '</button>';

  document.getElementById('bridge-inner').innerHTML = html;
  showScreen('bridge');

  var btn = document.getElementById('bridge-next-btn');

    if (state.chapterIndex < CHAPTER_ORDER.length - 1){

      showScreen('survey');
      renderSurveyInner();

}

var AXIS_ANGLES = [-90, -18, 54, 126, 198]; /* deg, 공간/바람/불/물/흙 순 */

function polarPoint(cx, cy, r, angleDeg){
  var rad = angleDeg * Math.PI / 180;
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}

function buildPolygonPoints(values, cx, cy, maxR){
  return values.map(function(v, i){
    var p = polarPoint(cx, cy, maxR * (v/100), AXIS_ANGLES[i]);
    return p.x.toFixed(1) + ',' + p.y.toFixed(1);
  }).join(' ');
}

function screenResultHTML(){

    '<div id="screen-result" class="screen">' +

      '<div id="radar-holder"></div>' +
      '<div class="legend">' +
        '<div class="legend-item"><div class="legend-swatch" style="background:#46524D"></div>본질 (P)</div>' +
        '<div class="legend-item"><div class="legend-swatch" style="background:#B5813F"></div>현재 (V)</div>' +
      '</div>' +
      '<button id="to-report-btn" class="btn-primary" style="margin-top:28px;">리포트 보기</button>' +
    '</div>'
  );
}

function renderRadar(results){
  var cx = 135, cy = 135, maxR = 100;
  var pValues = CHAPTER_ORDER.map(function(id){ return results.elementStats[id].pPercent; });
  var vValues = CHAPTER_ORDER.map(function(id){ return results.elementStats[id].vPercent; });

  var gridRings = [25,50,75,100].map(function(pct){
    var pts = buildPolygonPoints([pct,pct,pct,pct,pct], cx, cy, maxR);
    return '<polygon points="' + pts + '" fill="none" stroke="#DAD7D3" stroke-width="1"/>';
  }).join('');

  var axisLines = AXIS_ANGLES.map(function(angle){
    var p = polarPoint(cx, cy, maxR, angle);
    return '<line x1="' + cx + '" y1="' + cy + '" x2="' + p.x.toFixed(1) + '" y2="' + p.y.toFixed(1) + '" stroke="#DAD7D3" stroke-width="1"/>';
  }).join('');

  var pPoly = buildPolygonPoints(pValues, cx, cy, maxR);
  var vPoly = buildPolygonPoints(vValues, cx, cy, maxR);

  var labels = CHAPTER_ORDER.map(function(id, i){
    var p = polarPoint(cx, cy, maxR + 22, AXIS_ANGLES[i]);
    return '<text x="' + p.x.toFixed(1) + '" y="' + p.y.toFixed(1) + '" text-anchor="middle" font-size="11" fill="#8D8581" font-family="Noto Sans KR">' + elName(id) + '</text>';
  }).join('');

  var svg =
    '<svg width="270" height="270" viewBox="0 0 270 270">' +
      gridRings + axisLines +
      '<polygon points="' + pPoly + '" fill="rgba(70,82,77,0.18)" stroke="#46524D" stroke-width="2"/>' +
      '<polygon points="' + vPoly + '" fill="rgba(193,155,113,0.28)" stroke="#B5813F" stroke-width="2"/>' +
      labels +
    '</svg>';

  document.getElementById('radar-holder').innerHTML = svg;
}

    '<p class="s4-desc">' + name + ' 님의 본질은 ' + dosha.name + ' 타입입니다. 평소에는 ' + dosha.stable + ' 면이, 현재는 ' + dosha.unstable + ' 경향이 함께 나타날 수 있습니다.</p>' +

    '<div class="msg-card stable">' +
      '<div class="msg-eyebrow">나의 체질에 동조되는 명상</div>' +
      '<p class="msg-body">' + constitutionRemedy + '</p>' +
    '</div>';

  if (results.concernList.length > 0){
    html += '<div class="concern-section-title">5원소 탐구에서 발견된 불균형과 추천 명상</div>';
    results.concernList.forEach(function(c){
      html +=
        '<div class="msg-card unstable">' +
          '<div class="msg-eyebrow">' + c.name + ' 원소</div>' +
          '<p class="msg-body">' + c.insight + '<br>' + c.remedy + '에 의식을 연결하는 명상이 ' + c.name + ' 원소의 불안을 조율해 줄 것입니다.</p>' +
          '<div class="remedy-chip unstable">◦ ' + c.remedy + ' 명상</div>' +
        '</div>';
    });
  } else {
    html +=
      '<div class="msg-card stable">' +
        '<div class="msg-eyebrow">5원소 탐구 결과</div>' +
        '<p class="msg-body">이번 탐구에서는 뚜렷한 불균형 신호가 나타나지 않았습니다. 지금의 균형을 편안하게 유지해보세요.</p>' +
      '</div>';
  }

  html +=
    '<p class="footer-note">' + REPORT_FOOTER.disclaimer + '</p>' +
    '<button id="to-save-btn" class="btn-primary" style="margin-top:10px;">이미지로 저장하기</button>';

  document.getElementById('report-inner').innerHTML = html;
  var btn = document.getElementById('to-save-btn');
  if (btn) btn.addEventListener('click', function(){ showScreen('save'); });
}

/* ---- 저장 ---- */

function screenSaveHTML(){
  return (
    '<div id="screen-save" class="screen">' +
      '<div class="s5-title">나만의 결과를<br>이미지로 간직하세요</div>' +
      '<div id="capture-target"></div>' +
      '<button id="save-btn" class="btn-outline">⬇ 이미지로 저장</button>' +
      '<div class="save-note">아이폰(Safari)에서는 새 탭에 이미지가 열립니다.<br>이미지를 길게 눌러 "사진에 저장"을 선택해주세요</div>' +
      '<button id="save-text-btn" class="btn-outline" style="margin-top:12px;">⬇ 전체 설명 다운로드</button>' +
      '<button id="restart-btn" class="btn-text" style="margin-top:18px;">처음부터 다시 하기</button>' +
    '</div>'
  );
}

function generateFullReportText(results){
  var dosha = DOSHA_DATA[results.doshaKey];
  var name = state.name || '오리';
  var today = new Date();
  var dateStr = today.getFullYear() + '.' + String(today.getMonth()+1).padStart(2,'0') + '.' + String(today.getDate()).padStart(2,'0');

  var lines = [];
  lines.push('Waum 5원소 자기탐구 결과');
  lines.push('이름: ' + name);
  lines.push('날짜: ' + dateStr);
  lines.push('');
  lines.push('[ 나의 타고난 기질 ]');
  lines.push(name + ' 님의 본질은 ' + dosha.name + ' 타입입니다. 평소에는 ' + dosha.stable + ' 면이, 현재는 ' + dosha.unstable + ' 경향이 함께 나타날 수 있습니다.');
  lines.push('');
  lines.push('[ 나의 체질에 동조되는 명상 ]');
  lines.push(constitutionRemedyText(results.doshaKey));
  lines.push('');
  lines.push('[ 5원소 탐구에서 발견된 불균형과 추천 명상 ]');
  if (results.concernList.length > 0){
    results.concernList.forEach(function(c){
      lines.push('- ' + c.name + ' 원소: ' + c.insight + ' ' + c.remedy + eulReul(c.remedy) + ' 의식을 연결하는 명상이 ' + c.name + ' 원소의 불안을 조율해 줄 것입니다.');
    });
  } else {
    lines.push('이번 탐구에서는 뚜렷한 불균형 신호가 나타나지 않았습니다. 지금의 균형을 편안하게 유지해보세요.');
  }
  lines.push('');
  lines.push(REPORT_FOOTER.disclaimer);
  lines.push('Waum Meditation | ' + dateStr + ' 발행 | 작성자: ' + name);

  return lines.join('\n');
}

function renderSaveScreen(results){
  var dosha = DOSHA_DATA[results.doshaKey];
  var name = state.name || '오리';
  var today = new Date();
  var dateStr = today.getFullYear() + '.' + String(today.getMonth()+1).padStart(2,'0') + '.' + String(today.getDate()).padStart(2,'0');
  var footerText = REPORT_FOOTER.footerTextTemplate.replace('{date}', dateStr).replace('{name}', name);

  var html =
    '<div class="top">' +
      '<div class="name">' + name + ' 님</div>' +
      '<div class="dosha">' + dosha.name + '</div>' +
    '</div>' +
    '<div class="body-inner">' +
      '<p style="font-size:13px;line-height:1.7;margin:0;color:var(--ink);">' +
        constitutionRemedyText(results.doshaKey) +
      '</p>' +
    '</div>' +
    '<div class="bottom">' + footerText + '</div>';

  document.getElementById('capture-target').innerHTML = html;

  var saveBtn = document.getElementById('save-btn');
  if (saveBtn){
    saveBtn.addEventListener('click', function(){
      if (typeof html2canvas === 'undefined'){
        alert('이미지 저장 기능을 불러오지 못했습니다. 인터넷 연결을 확인하고 다시 시도해주세요.');
        return;
      }
      var originalLabel = saveBtn.innerHTML;
      saveBtn.innerHTML = '이미지 생성 중...';
      saveBtn.disabled = true;

      var target = document.getElementById('capture-target');
      html2canvas(target, { backgroundColor:'#FFFFFF', scale:2, useCORS:true }).then(function(canvas){
        canvas.toBlob(function(blob){
          saveBtn.innerHTML = originalLabel;
          saveBtn.disabled = false;
          if (!blob){
            alert('이미지 생성에 실패했습니다. 다시 시도해주세요.');
            return;
          }
          var url = URL.createObjectURL(blob);
          var isIOS = /iP(hone|od|ad)/.test(navigator.userAgent);
          if (isIOS){
            var w = window.open(url, '_blank');
            if (!w){
              alert('팝업이 차단되었습니다. 팝업 허용 후 다시 시도해주세요.');
            }
          } else {
            var link = document.createElement('a');
            link.download = 'waum_result_' + name + '.png';
            link.href = url;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
          }
          setTimeout(function(){ URL.revokeObjectURL(url); }, 30000);
        }, 'image/png');
      }).catch(function(err){
        saveBtn.innerHTML = originalLabel;
        saveBtn.disabled = false;
        alert('이미지 생성 중 문제가 발생했습니다. 다시 시도해주세요.');
      });
    });
  }

  var saveTextBtn = document.getElementById('save-text-btn');
  if (saveTextBtn){
    saveTextBtn.addEventListener('click', function(){
      var text = generateFullReportText(results);
      var blob = new Blob([text], { type:'text/plain;charset=utf-8' });
      var url = URL.createObjectURL(blob);
      var link = document.createElement('a');
      link.download = 'waum_report_' + name + '.txt';
      link.href = url;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      setTimeout(function(){ URL.revokeObjectURL(url); }, 30000);
    });
  }

  var restartBtn = document.getElementById('restart-btn');
  if (restartBtn){
    restartBtn.addEventListener('click', function(){
      state.name = '';
      state.answers = {};
      state.chapterIndex = 0;
      state.questionIndexInChapter = 0;
      render();
    });
  }
}

/* ---- 인트로 이벤트 ---- */

function bindEvents(){
  var nameInput = document.getElementById('name-input');
  var startBtn = document.getElementById('start-btn');
  if (nameInput){
    nameInput.addEventListener('input', function(){
      state.name = nameInput.value.trim();
      startBtn.disabled = state.name.length === 0;
    });
  }
  if (startBtn){
    startBtn.addEventListener('click', function(){
      if (!state.name) return;
      showScreen('survey');
      renderSurveyInner();
    });
  }
  var toReportBtn = document.getElementById('to-report-btn');
  if (toReportBtn){
    toReportBtn.addEventListener('click', function(){ showScreen('report'); });
  }
}

render();
</script>
