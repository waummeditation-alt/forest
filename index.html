<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Waum 5원소 자기탐구</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ECE9E6;
    --card:#FFFFFF;
    --ink:#5A4F4B;
    --ink-soft:#8D8581;
    --muted:#AAA4A0;
    --line:#DAD7D3;
    --sage:#61756D;
    --sage-deep:#46524D;
    --sage-soft:#D3D4D0;
    --sage-soft-border:#BBC0BC;
    --tan:#C19B71;
    --tan-deep:#735D46;
    --tan-soft:#E3D8CC;
    --tan-soft-border:#D9C6B1;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    font-family:'Noto Sans KR',sans-serif;
    color:var(--ink);
    min-height:100vh;
    display:flex;
    justify-content:center;
  }
  #app{
    width:100%;
    max-width:460px;
    min-height:100vh;
    background:var(--bg);
    display:flex;
    flex-direction:column;
    position:relative;
  }
  .screen{ display:none; flex-direction:column; flex:1; padding:32px 24px 40px; }
  .screen.active{ display:flex; }

  .mark{ font-family:'Noto Serif KR',serif; font-size:14px; letter-spacing:0.3em; color:var(--sage-deep); text-align:center; margin-bottom:8px;}

  /* philosophy */
  .phil-eyebrow{ font-size:12px; color:var(--tan-deep); letter-spacing:0.05em; margin:0 0 10px; }
  .phil-title{ font-family:'Noto Serif KR',serif; font-weight:500; font-size:26px; line-height:1.4; margin:0 0 18px; }
  .phil-rule{ width:32px; height:1px; background:var(--line); margin:0 0 26px; }
  .phil-card{
    background:var(--card); border-radius:4px; padding:26px 22px;
    border-left:3px solid var(--tan); margin-bottom:26px;
  }
  .phil-card-label{ font-size:11.5px; color:var(--tan-deep); margin:0 0 14px; }
  .phil-card p{ font-size:14px; line-height:1.75; margin:0 0 16px; }
  .phil-card p.strong{ font-weight:600; margin-bottom:16px; }
  .phil-card p.italic{ font-style:italic; color:var(--ink-soft); margin-bottom:0; }
  .phil-lead{ font-size:14px; line-height:1.75; margin:0 0 20px; }
  .dosha-row{ display:flex; gap:10px; margin-bottom:26px; }
  .dosha-card{
    flex:1; background:var(--card); border-radius:4px; border:1px solid var(--line);
    padding:20px 8px 16px; text-align:center;
  }
  .dosha-icon{
    width:42px; height:42px; border-radius:50%; background:var(--tan-soft);
    display:flex; align-items:center; justify-content:center; margin:0 auto 12px;
  }
  .dosha-icon svg{ width:20px; height:20px; }
  .dosha-name{ font-size:14px; font-weight:700; color:var(--ink); margin:0 0 2px; }
  .dosha-eng{ font-size:11px; font-weight:600; color:var(--sage); margin:0 0 6px; }
  .dosha-el{ font-size:11px; color:var(--muted); }
  #screen-philosophy .btn-primary{ margin-top:0; }

  /* intro */
  #screen-intro{ align-items:center; justify-content:center; text-align:center; }
  .breathe{
    width:140px;height:140px;border-radius:50%;
    border:1px solid var(--sage);
    display:flex;align-items:center;justify-content:center;
    margin:26px 0 30px; position:relative;
  }
  .breathe::before{ content:'';position:absolute;inset:18px;border-radius:50%;border:1px solid var(--sage);opacity:0.55; }
  .breathe::after{ content:'';position:absolute;inset:38px;border-radius:50%;background:var(--sage);opacity:0.12; }
  #screen-intro h1{ font-family:'Noto Serif KR',serif; font-weight:500; font-size:23px; line-height:1.55; margin:0 0 10px; }
  #screen-intro p.sub{ font-size:13px; color:var(--ink-soft); line-height:1.7; margin:0 0 28px; }
  .field{
    width:100%; border:none; border-bottom:1px solid var(--line);
    background:transparent; text-align:center; font-size:15px; padding:10px 0;
    color:var(--ink); font-family:'Noto Sans KR',sans-serif;
  }
  .field::placeholder{ color:var(--muted); }
  .field:focus{ outline:none; border-bottom-color:var(--sage); }
  .btn-primary{
    margin-top:28px; width:100%; padding:14px; border:none; border-radius:4px;
    background:var(--sage-deep); color:var(--bg); font-size:14px; letter-spacing:0.05em;
    font-family:'Noto Sans KR',sans-serif; cursor:pointer;
  }
  .btn-primary:disabled{ opacity:0.4; cursor:default; }
  .btn-outline{
    width:100%; padding:13px; border-radius:4px; border:1px solid var(--sage-deep);
    background:transparent; color:var(--sage-deep); font-size:14px; font-family:'Noto Sans KR',sans-serif;
    display:flex; align-items:center; justify-content:center; gap:8px; cursor:pointer;
  }
  .btn-text{ background:none;border:none;font-size:13px;color:var(--ink-soft); padding:8px 4px; cursor:pointer; font-family:'Noto Sans KR',sans-serif; }

  /* survey */
  .chapters{ display:flex; justify-content:space-between; margin-bottom:6px; }
  .chapter-dot-wrap{ display:flex; flex-direction:column; align-items:center; gap:6px; flex:1;}
  .dot{ width:10px;height:10px;border-radius:50%;background:var(--line); transition:background .2s,width .2s,height .2s; }
  .dot.active{ background:var(--sage-deep); width:12px; height:12px; }
  .dot.done{ background:var(--sage); }
  .chapter-label{ font-size:10px; color:var(--muted); }
  .chapter-label.active{ color:var(--sage-deep); font-weight:500; }
  .chapter-title{ font-family:'Noto Serif KR',serif; font-size:19px; font-weight:500; margin:22px 0 4px; }
  .q-count{ font-size:12px; color:var(--muted); margin-bottom:22px; }
  .question-card{
    background:var(--card); border-radius:14px; padding:24px 20px; border:1px solid var(--line);
    flex:1; display:flex; flex-direction:column; justify-content:space-between;
  }
  .q-text{ font-size:16px; line-height:1.75; margin:0 0 26px; }
  .scale-row{ display:flex; justify-content:space-between; align-items:center; }
  .scale-opt{
    width:38px;height:38px;border-radius:50%;border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--muted);
    background:none; cursor:pointer; font-family:'Noto Sans KR',sans-serif;
  }
  .scale-opt.sel{ border-color:var(--sage-deep); color:var(--sage-deep); font-weight:500; background:var(--sage-soft); }
  .scale-caption{ display:flex; justify-content:space-between; font-size:10px; color:var(--muted); margin-top:10px; }
  .nav-row{ display:flex; justify-content:space-between; margin-top:22px; }

  .element-info-card{
    border-bottom:1px solid var(--line); padding-bottom:16px; margin-bottom:18px;
  }
  .element-info-header{ display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .element-info-photo{
    width:44px; height:44px; border-radius:50%; object-fit:cover; flex:none;
    border:1px solid var(--line);
  }
  .element-info-person{ font-size:11px; color:var(--muted); margin-bottom:3px; }
  .element-info-concept{
    font-family:'Noto Serif KR',serif; font-size:13.5px; color:var(--ink); line-height:1.5;
  }
  .element-info-meta{ display:flex; flex-wrap:wrap; gap:6px 16px; font-size:11.5px; color:var(--ink-soft); }
  .element-info-meta .label{ color:var(--muted); margin-right:3px; }

  .element-percent-block{ margin-top:20px; padding-top:18px; border-top:1px solid var(--line); }
  .element-percent-row{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px; }
  .element-percent-label{ font-size:13px; color:var(--ink); }
  .element-percent-value{ font-family:'Noto Serif KR',serif; font-size:19px; font-weight:500; color:var(--sage-deep); }
  .element-percent-bar{ width:100%; height:6px; border-radius:3px; background:var(--line); overflow:hidden; }
  .element-percent-fill{ height:100%; border-radius:3px; background:var(--sage-deep); }
  .element-percent-note{ font-size:11px; color:var(--muted); margin-top:8px; line-height:1.6; }

  /* result / radar */
  #screen-result{ align-items:center; }
  .s3-title{ font-family:'Noto Serif KR',serif; font-size:19px; font-weight:500; margin:0 0 4px; text-align:center; }
  .s3-sub{ font-size:12px; color:var(--muted); text-align:center; margin:0 0 6px; }
  .legend{ display:flex; gap:20px; justify-content:center; margin-top:8px; }
  .legend-item{ display:flex; align-items:center; gap:6px; font-size:11px; color:var(--ink-soft); }
  .legend-swatch{ width:10px;height:10px;border-radius:50%; }
  .s3-reflect{
    font-family:'Noto Serif KR',serif; font-size:13px; color:var(--ink-soft);
    text-align:center; line-height:1.6; margin:22px 0 0; padding:0 10px;
  }

  .view-tabs{ display:flex; justify-content:center; gap:6px; margin:14px 0 18px; }
  .view-tab{
    font-size:12px; color:var(--muted); padding:6px 16px; border-radius:20px;
    border:1px solid var(--line); cursor:pointer; background:none; font-family:'Noto Sans KR',sans-serif;
  }
  .view-tab.active{ color:#FFFFFF; background:#46524D; border-color:#46524D; }
  .view-panel{ display:none; width:100%; }
  .view-panel.active{ display:flex; flex-direction:column; align-items:center; }

  .chakra-dosha-line{ display:flex; align-items:center; justify-content:center; gap:7px; font-size:13px; color:var(--ink); margin-bottom:16px; }
  .chakra-summary-line{ text-align:center; font-size:12.5px; color:var(--ink); margin-top:16px; line-height:1.8; }
  .chakra-dosha-dot{ width:7px; height:7px; border-radius:50%; background:#46524D; flex:none; }
  .chakra-figure-wrap{ position:relative; width:100%; max-width:220px; margin:0 auto; }
  .chakra-figure-wrap img{ width:100%; display:block; }
  .chakra-dot{
    position:absolute; width:11px; height:11px; margin:-5.5px 0 0 -5.5px;
    border-radius:50%; border:1.5px solid var(--bg);
  }
  .chakra-list{ display:flex; flex-direction:column; gap:7px; margin-top:18px; font-size:12.5px; color:var(--ink); width:100%; max-width:240px; }
  .chakra-list-item{ display:flex; align-items:center; gap:8px; }
  .chakra-list-dot{ width:8px; height:8px; border-radius:50%; flex:none; }
  .chakra-list-status{ color:var(--muted); }

  /* 결과 화면 하단: 5원소 퍼센트 + 도샤 설명 */
  .result-detail{ width:100%; margin-top:30px; padding-top:26px; border-top:1px solid var(--line); }
  .result-detail-title{ font-family:'Noto Serif KR',serif; font-size:15px; font-weight:500; margin:0 0 16px; text-align:center; color:var(--ink); }
  .result-percent-list{ display:flex; flex-direction:column; gap:12px; margin-bottom:8px; }
  .result-percent-top{ display:flex; justify-content:space-between; font-size:13px; margin-bottom:6px; }
  .result-percent-name{ color:var(--ink); }
  .result-percent-value{ font-family:'Noto Serif KR',serif; font-weight:500; color:var(--ink); }
  .result-percent-bar{ width:100%; height:6px; border-radius:3px; background:var(--line); overflow:hidden; }
  .result-percent-fill{ height:100%; border-radius:3px; }

  .result-quality-row{ display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
  .result-quality-tag{
    font-size:10.5px; color:var(--ink-soft); background:var(--card); border:1px solid var(--line);
    border-radius:20px; padding:3px 10px;
  }
  .result-quality-label{ color:var(--muted); margin-right:4px; }

  .dosha-result-block{ text-align:center; margin:28px 0 18px; }
  .dosha-result-eyebrow{ font-size:11px; letter-spacing:0.1em; color:var(--muted); margin-bottom:6px; }
  .dosha-result-name{ font-family:'Noto Serif KR',serif; font-size:22px; font-weight:500; margin-bottom:8px; color:var(--ink); }
  .dosha-result-desc{ font-size:13px; color:var(--ink-soft); line-height:1.75; padding:0 6px; }

  .dosha-trait-title{ font-size:11px; font-weight:500; letter-spacing:0.03em; margin-bottom:8px; }

  #save-result-img-btn{ width:100%; }

  /* 초대의 글 */
  #screen-invite{ padding-top:44px; }
  .invite-title{
    font-family:'Noto Serif KR',serif; font-weight:500; font-size:26px;
    letter-spacing:0.05em; color:var(--ink); text-align:center; margin:0 0 44px;
  }
  .invite-section-title{
    font-family:'Noto Serif KR',serif; font-size:16px; font-weight:500;
    text-align:center; color:var(--ink); margin:0 0 10px; line-height:1.5;
  }
  .invite-body p{
    font-size:13px; line-height:1.85; color:var(--ink); margin:0 0 16px;
  }
  .invite-divider{ width:32px; height:1px; background:var(--line); margin:34px auto; }

  /* 자기 탐구 질문 페이지 (타이포그래피) */
  #screen-inquiry{ justify-content:center; align-items:center; text-align:center; }
  .inquiry-eyebrow{ font-size:11px; letter-spacing:0.15em; color:var(--muted); margin-bottom:48px; }
  .inquiry-block{ margin-bottom:44px; }
  .inquiry-num{ font-size:11px; color:var(--muted); margin-bottom:10px; }
  .inquiry-question{
    font-family:'Noto Serif KR',serif; font-size:20px; font-weight:500;
    color:var(--ink); line-height:1.6;
  }
  .inquiry-divider{ width:28px; height:1px; background:var(--line); margin:0 auto 44px; }
  .inquiry-mark{ font-size:11px; letter-spacing:0.15em; color:var(--muted); margin-top:56px; }

  .inquiry-cta-btn{
    background:none; border:1px solid var(--line); border-radius:18px;
    padding:24px 30px; cursor:pointer; font-family:inherit; -webkit-appearance:none;
  }
  .inquiry-cta-title{ font-family:'Noto Serif KR',serif; font-size:26px; font-weight:500; color:var(--ink); margin-bottom:6px; }
  .inquiry-cta-desc{ font-size:12px; color:var(--ink-soft); }

  /* 숲명상 방법 화면 */
  #screen-method{ justify-content:center; align-items:center; text-align:center; }
  .method-title{
    font-family:'Noto Serif KR',serif; font-size:23px; font-weight:500;
    color:var(--ink); margin:0 0 30px; line-height:1.5;
  }
  .method-photo{ width:100%; max-width:280px; border-radius:14px; margin-bottom:26px; }
  .method-caption{ font-size:15px; color:var(--ink); line-height:1.7; margin-bottom:0; }

  /* result page capture (image/pdf export) */
  #result-capture{
    width:460px; background:var(--bg); padding:36px 30px 30px; box-sizing:border-box;
    font-family:'Noto Sans KR',sans-serif; color:var(--ink);
  }
  #result-capture .rc-card{
    background:var(--card); border-radius:16px; padding:28px 24px; border:1px solid var(--line);
  }
  #result-capture .rc-date{ font-size:11px; color:var(--muted); text-align:center; margin-top:2px; margin-bottom:22px; }
  #result-capture .rc-footer-brand{
    text-align:center; margin-top:26px; padding-top:16px; border-top:1px solid var(--line);
    font-size:11px; color:var(--muted); letter-spacing:0.02em;
  }

  /* report */
  .s4-eyebrow{ font-size:11px; letter-spacing:0.1em; color:var(--muted); margin-bottom:6px; }
  .s4-title{ font-family:'Noto Serif KR',serif; font-size:21px; font-weight:500; margin:0 0 4px; }
  .s4-desc{ font-size:13px; color:var(--ink-soft); line-height:1.7; margin:0 0 22px; }
  .msg-card{ border-radius:14px; padding:20px; margin-bottom:14px; }
  .msg-card.stable{ background:var(--sage-soft); border:1px solid var(--sage-soft-border); }
  .msg-card.unstable{ background:var(--tan-soft); border:1px solid var(--tan-soft-border); }
  .msg-eyebrow{ font-size:11px; font-weight:500; margin-bottom:8px; letter-spacing:0.03em; }
  .msg-card.stable .msg-eyebrow{ color:var(--sage-deep); }
  .msg-card.unstable .msg-eyebrow{ color:var(--tan-deep); }
  .msg-body{ font-size:14px; line-height:1.75; margin:0; color:var(--ink); }
  .remedy-chip{
    display:inline-flex; align-items:center; gap:6px; margin-top:12px;
    font-size:12px; padding:6px 12px; border-radius:20px; background:#fff;
  }
  .remedy-chip.stable{ color:var(--sage-deep); border:1px solid var(--sage-soft-border); }
  .remedy-chip.unstable{ color:var(--tan-deep); border:1px solid var(--tan-soft-border); }
  .footer-note{ font-size:11px; color:var(--muted); line-height:1.7; margin-top:8px; text-align:center; }
  .concern-section-title{ font-family:'Noto Serif KR',serif; font-size:15px; font-weight:500; margin:26px 0 12px; color:var(--ink); }

  /* save */
  #screen-save{ align-items:center; }
  .s5-title{ font-family:'Noto Serif KR',serif; font-size:18px; font-weight:500; margin:0 0 18px; text-align:center; }
  #capture-target{
    width:100%; border-radius:14px; overflow:hidden; border:1px solid var(--line);
    background:var(--card); margin-bottom:22px;
  }
  #capture-target .top{ background:var(--sage-deep); padding:22px; text-align:center; }
  #capture-target .top .name{ font-family:'Noto Serif KR',serif; color:var(--bg); font-size:14px; }
  #capture-target .top .dosha{ font-family:'Noto Serif KR',serif; color:var(--bg); font-size:21px; margin-top:6px; }
  #capture-target .body-inner{ padding:18px 20px; }
  #capture-target .bottom{ padding:14px 18px; font-size:11px; color:var(--muted); text-align:center; border-top:1px solid var(--line); }
  .save-note{ font-size:11px; color:var(--muted); margin-top:14px; text-align:center; line-height:1.6; }

  /* full report capture (image/pdf export) */
  #fullreport-capture{
    width:460px; background:var(--bg); padding:36px 30px 30px; box-sizing:border-box;
    font-family:'Noto Sans KR',sans-serif; color:var(--ink);
  }
  #fullreport-capture .fr-card{
    background:var(--card); border-radius:16px; padding:28px 24px; border:1px solid var(--line);
  }
  #fullreport-capture .fr-date{ font-size:11px; color:var(--muted); text-align:center; margin-top:2px; margin-bottom:22px; }
  #fullreport-capture .fr-footer-brand{
    text-align:center; margin-top:26px; padding-top:16px; border-top:1px solid var(--line);
    font-size:11px; color:var(--muted); letter-spacing:0.02em;
  }
  #save-format-row{ display:flex; gap:10px; margin-top:12px; }
  #save-format-row .btn-outline{ margin-top:0; flex:1; padding:13px 6px; font-size:13px; }
</style>
</head>
<body>
<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
/* ============ 데이터 ============ */

var ELEMENTS = [
  { id:'ether', name:'공간', color:'sage-soft-border', desc:'마음의 여백과 자유' },
  { id:'air',   name:'바람', color:'sage',             desc:'가벼운 움직임과 변화' },
  { id:'fire',  name:'불',   color:'tan-deep',          desc:'뜨거운 열기와 성취' },
  { id:'water', name:'물',   color:'tan',               desc:'촉촉한 생기와 감성적 공감' },
  { id:'earth', name:'흙',   color:'ink',               desc:'단단한 뿌리와 안정' }
];

/* 원소 -> 도샤 매핑 (최종 확정본, 점수 계산용) */
var ELEMENT_TO_DOSHA = {
  ether:'Vata', air:'Vata',
  fire:'Pitta', water:'Pitta',
  earth:'Kapha'
};

/* 원소별 자기공명 명상 대상: 불균형이 감지된 원소는 같은 원소의 자연 대상과 연결하면
   저절로 비워지고 채워지며 균형을 찾는다는 전제 */
var ELEMENT_REMEDY = {
  ether:'텅 빈 하늘',
  air:'바람에 흔들리는 나뭇잎',
  fire:'태양의 빛',
  water:'맑은 물',
  earth:'대지의 바위'
};

var ELEMENT_INFO = {
  ether: {
    concept: '무한한 가능성의 텅 빈 공간의 에너지',
    nature: '텅 빈 하늘',
    bodyPart: '머리와 목',

function questionsOfElement(elId){
  return QUESTIONS.filter(function(q){ return q.element === elId; });
}

/* 받침 유무에 따라 조사를 자동으로 붙이기 위한 헬퍼 */
function hasBatchim(str){
  if (!str) return false;
  var lastChar = str.charAt(str.length - 1);
  var code = lastChar.charCodeAt(0) - 0xAC00;
  if (code < 0 || code > 11171) return false;
  return (code % 28) !== 0;
}
function eulReul(w){ return hasBatchim(w) ? '을' : '를'; }
function eunNeun(w){ return hasBatchim(w) ? '은' : '는'; }
function gwaWa(w){ return hasBatchim(w) ? '과' : '와'; }
function iGa(w){ return hasBatchim(w) ? '이' : '가'; }

/* ============ 계산 로직 ============ */

function effectiveAnswer(q){
  var raw = state.answers[q.id];
  if (!raw) return 0;
  return q.reverse ? (6 - raw) : raw;
}

function computeElementMax(elId, type){
  var qs = questionsOfElement(elId).filter(function(q){ return q.type === type; });
  var sum = 0;
  qs.forEach(function(q){ sum += q.weight * 5; });
  return sum;
}

function computeElementScore(elId, type){
  var qs = questionsOfElement(elId).filter(function(q){ return q.type === type; });
  var sum = 0;
  qs.forEach(function(q){
    sum += effectiveAnswer(q) * q.weight;
  });
  return sum;
}

function topConcernQuestion(elId){
  var qs = questionsOfElement(elId).filter(function(q){ return q.type === 'V' && state.answers[q.id]; });
  if (qs.length === 0) return null;
  return qs.slice().sort(function(a,b){ return effectiveAnswer(b) - effectiveAnswer(a); })[0];
}

function computeElementStats(elId){
  var pScore = computeElementScore(elId,'P');
  var vScore = computeElementScore(elId,'V');
  var pMax = computeElementMax(elId,'P');
  var vMax = computeElementMax(elId,'V');
  var pPercent = pMax > 0 ? (pScore / pMax * 100) : 0;
  var vPercent = vMax > 0 ? (vScore / vMax * 100) : 0;
  return {
    pScore:pScore, vScore:vScore, pMax:pMax, vMax:vMax,
    pPercent:pPercent, vPercent:vPercent,
    diff: pPercent - vPercent
  };
}

var ELEMENT_STATE_THRESHOLD = 10; /* diff(P%-V%)가 이 값보다 크면 안정, 작으면(음수) 불안정, 그 사이는 균형 */

function elementStateLabel(diff){
  if (diff > ELEMENT_STATE_THRESHOLD) return 'stable';
  if (diff < -ELEMENT_STATE_THRESHOLD) return 'unstable';
  return 'neutral';
}

function computeResults(){
  var elementStats = {};
  CHAPTER_ORDER.forEach(function(elId){
    elementStats[elId] = computeElementStats(elId);
  });

  /* 도샤별 P% 산출 (바타=공간+바람, 피타=불+물, 카파=흙) */
  var doshaPMax = {
    Vata: elementStats.ether.pMax + elementStats.air.pMax,
    Pitta: elementStats.fire.pMax + elementStats.water.pMax,
    Kapha: elementStats.earth.pMax
  };
  var doshaPScore = {
    Vata: elementStats.ether.pScore + elementStats.air.pScore,
    Pitta: elementStats.fire.pScore + elementStats.water.pScore,
    Kapha: elementStats.earth.pScore
  };
  var doshaPercent = {
    Vata: doshaPScore.Vata / doshaPMax.Vata * 100,
    Pitta: doshaPScore.Pitta / doshaPMax.Pitta * 100,
    Kapha: doshaPScore.Kapha / doshaPMax.Kapha * 100
  };

  var ranked = ['Vata','Pitta','Kapha'].sort(function(a,b){
    return doshaPercent[b] - doshaPercent[a];
  });
  var top = ranked[0], second = ranked[1], third = ranked[2];
  var gapTopSecond = doshaPercent[top] - doshaPercent[second];
  var gapSecondThird = doshaPercent[second] - doshaPercent[third];

  var doshaKey;
  if (gapTopSecond <= DOSHA_COMPOUND_THRESHOLD && gapSecondThird <= DOSHA_COMPOUND_THRESHOLD){
    doshaKey = 'VPK_Balance';
  } else if (gapTopSecond <= DOSHA_COMPOUND_THRESHOLD){
    var pair = [top, second].sort();
    if (pair.indexOf('Vata') > -1 && pair.indexOf('Pitta') > -1) doshaKey = 'Vata_Pitta';
    else if (pair.indexOf('Vata') > -1 && pair.indexOf('Kapha') > -1) doshaKey = 'Vata_Kapha';
    else doshaKey = 'Pitta_Kapha';
  } else {
    doshaKey = top;
  }

  /* 안정/불안정 원소 (P%-V% 차이 기준) */
  var elIds = CHAPTER_ORDER.slice();
  var stableElId = elIds.slice().sort(function(a,b){ return elementStats[b].diff - elementStats[a].diff; })[0];
  var unstableElId = elIds.slice().sort(function(a,b){ return elementStats[a].diff - elementStats[b].diff; })[0];

  var stableDoshaKey = ELEMENT_TO_DOSHA[stableElId];
  var unstableDoshaKey = ELEMENT_TO_DOSHA[unstableElId];
  var concernList = computeConcernList(elementStats);

  return {
    elementStats: elementStats,
    doshaPercent: doshaPercent,
    doshaKey: doshaKey,
    stableElId: stableElId,
    unstableElId: unstableElId,
    stableDoshaKey: stableDoshaKey,
    unstableDoshaKey: unstableDoshaKey,
    concernList: concernList
  };
}

/* 5원소 탐구 전체에서 강하게(4점 이상) 나타난 불균형 원소들을 모아 정리 */
function computeConcernList(elementStats){
  var list = [];
  CHAPTER_ORDER.forEach(function(elId){
    var q = topConcernQuestion(elId);
    if (q && effectiveAnswer(q) >= 4){
      list.push({
        elId: elId,
        name: elName(elId),
        insight: q.insight,
        remedy: ELEMENT_REMEDY[elId]
      });
    }
  });
  return list;
}

/* 체질(도샤)에 동조되는 자연 명상 추천 문구 생성 */
function constitutionRemedyText(doshaKey){
  if (doshaKey === 'VPK_Balance'){
    return '다섯 원소 모두와 고르게 연결되는 통합 자연 명상을 추천합니다.';
  }
  if (DOSHA_CONSTITUTION_ELEMENTS[doshaKey]){
    var pair = DOSHA_CONSTITUTION_ELEMENTS[doshaKey];
    var primaryRemedy = ELEMENT_REMEDY[pair.primary];
    var secondaryRemedy = ELEMENT_REMEDY[pair.secondary];
    return primaryRemedy + eulReul(primaryRemedy) + ' 주 명상 대상으로, ' + secondaryRemedy + eulReul(secondaryRemedy) + ' 보조로 삼아 연결해보세요.';
  }
  /* 복합 타입: 두 도샤의 주 원소를 함께 추천 */
  var doshaParts = doshaKey.split('_');
  var remedies = doshaParts.map(function(d){
    return ELEMENT_REMEDY[DOSHA_CONSTITUTION_ELEMENTS[d].primary];
  });
  return remedies[0] + gwaWa(remedies[0]) + ' ' + remedies[1] + iGa(remedies[1]) + ' 함께 어우러진 명상을 추천합니다.';
}

      '<button id="prev-btn" class="btn-text">이전</button>' +
      '<button id="next-btn" class="btn-text" style="color:var(--sage-deep);font-weight:500;" ' + (currentAnswer ? '' : 'disabled') + '>' +
        (isLastQuestionOfChapter() ? '원소 정리 보기 →' : '다음 →') +
      '</button>' +
    '</div>';

  document.getElementById('survey-inner').innerHTML = html;
  bindSurveyEvents();
}

function isLastQuestionOfChapter(){
  var elId = CHAPTER_ORDER[state.chapterIndex];
  return state.questionIndexInChapter === questionsOfElement(elId).length - 1;
}

function isFirstQuestion(){
  return state.chapterIndex === 0 && state.questionIndexInChapter === 0;
}

function goNext(){
  var elId = CHAPTER_ORDER[state.chapterIndex];
  var qs = questionsOfElement(elId);
  if (state.questionIndexInChapter < qs.length - 1){
    state.questionIndexInChapter++;
    renderSurveyInner();
  } else {
    showBridge(elId);
  }
}

function goPrev(){
  if (isFirstQuestion()) return;
  if (state.questionIndexInChapter > 0){
    state.questionIndexInChapter--;
  } else {
    state.chapterIndex--;
    state.questionIndexInChapter = questionsOfElement(CHAPTER_ORDER[state.chapterIndex]).length - 1;
  }
  renderSurveyInner();
}

function bindSurveyEvents(){
  var opts = document.querySelectorAll('.scale-opt');
  opts.forEach(function(btn){
    btn.addEventListener('click', function(){
      var elId = CHAPTER_ORDER[state.chapterIndex];
      var qs = questionsOfElement(elId);
      var q = qs[state.questionIndexInChapter];
      state.answers[q.id] = parseInt(btn.getAttribute('data-value'), 10);
      renderSurveyInner();
    });
  });
  var next = document.getElementById('next-btn');
  if (next) next.addEventListener('click', goNext);
  var prev = document.getElementById('prev-btn');
  if (prev) prev.addEventListener('click', goPrev);
}

function finishSurvey(){
  window.results = computeResults();
  renderRadar(window.results);
  renderChakraView(window.results);
  renderResultDetail(window.results);
  renderReport(window.results);
  renderSaveScreen(window.results);
  showScreen('result');
}

function screenBridgeHTML(){
  return '<div id="screen-bridge" class="screen"><div id="bridge-inner"></div></div>';
}

function showBridge(elId){
  var stats = computeElementStats(elId);
  var content = BRIDGE_CONTENT[elId];
  var stateLabel = elementStateLabel(stats.diff);
  var name = elName(elId);
  var isLastChapter = state.chapterIndex === CHAPTER_ORDER.length - 1;
  var remedy = ELEMENT_REMEDY[elId];

  var stateText = ELEMENT_STATE_TEXT[stateLabel];
  var concernQ = topConcernQuestion(elId);
  var hasConcern = concernQ && effectiveAnswer(concernQ) >= 4;
  if (hasConcern){
    stateText = ELEMENT_STATE_TEXT.unstable + ' ' + concernQ.insight;
  }

  var remedyText = hasConcern
    ? remedy + eulReul(remedy) + ' 의식을 연결하는 명상이 ' + name + ' 원소의 불안을 조율해 줄 것입니다.'
    : '이 원소에 대응하는 명상은 ' + remedy + ' 명상입니다. 자연과의 공명을 통해 이 원소의 균형을 위한 조율이 일어납니다.';

  var percentValue = Math.max(0, Math.min(100, Math.round(stats.pPercent)));

  var html =
    '<div class="mark">' + name.toUpperCase() + '</div>' +
    '<div class="chapter-title" style="text-align:center;">' + name + ' 원소를 마치며</div>' +
    '<div class="question-card" style="margin-top:20px;">' +
      '<p class="q-text" style="margin-bottom:16px;">' + name + ' 원소는 ' + content.trait + eulReul(content.trait) + ' 특징으로 합니다.</p>' +
      '<p class="q-text" style="margin-bottom:16px;">' + name + ' 원소는 내 안에서 ' + content.role + eulReul(content.role) + ' 합니다.</p>' +
      '<p class="q-text" style="margin-bottom:16px;">' + stateText + '</p>' +
      '<p class="q-text" style="margin-bottom:0;">' + remedyText + '</p>' +
      '<div class="element-percent-block">' +
        '<div class="element-percent-row">' +
          '<div class="element-percent-label">내 안의 ' + name + ' 원소</div>' +
          '<div class="element-percent-value">' + percentValue + '%</div>' +
        '</div>' +
        '<div class="element-percent-bar"><div class="element-percent-fill" style="width:' + percentValue + '%;"></div></div>' +
        '<p class="element-percent-note">평소 나의 본질적 기질에서 ' + name + ' 원소가 차지하는 비중입니다.</p>' +
      '</div>' +
    '</div>' +
    '<button id="bridge-next-btn" class="btn-primary" style="margin-top:26px;">' +
      (isLastChapter ? '결과 보기 →' : '다음 원소로 →') +
    '</button>';

  document.getElementById('bridge-inner').innerHTML = html;
  showScreen('bridge');

  var btn = document.getElementById('bridge-next-btn');
  if (btn) btn.addEventListener('click', function(){
    if (state.chapterIndex < CHAPTER_ORDER.length - 1){
      state.chapterIndex++;
      state.questionIndexInChapter = 0;
      showScreen('survey');
      renderSurveyInner();
    } else {
      finishSurvey();
    }
  });
}

var AXIS_ANGLES = [-90, -18, 54, 126, 198]; /* deg, 공간/바람/불/물/흙 순 */

function polarPoint(cx, cy, r, angleDeg){
  var rad = angleDeg * Math.PI / 180;
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}

function buildPolygonPoints(values, cx, cy, maxR){
  return values.map(function(v, i){
    var p = polarPoint(cx, cy, maxR * (v/100), AXIS_ANGLES[i]);
    return p.x.toFixed(1) + ',' + p.y.toFixed(1);
  }).join(' ');
}

function buildRadarSVG(results){
  var cx = 135, cy = 135, maxR = 100;
  var pValues = CHAPTER_ORDER.map(function(id){ return results.elementStats[id].pPercent; });
  var vValues = CHAPTER_ORDER.map(function(id){ return results.elementStats[id].vPercent; });

  var gridRings = [25,50,75,100].map(function(pct){
    var pts = buildPolygonPoints([pct,pct,pct,pct,pct], cx, cy, maxR);
    return '<polygon points="' + pts + '" fill="none" stroke="#DAD7D3" stroke-width="1"/>';
  }).join('');

  var axisLines = AXIS_ANGLES.map(function(angle){
    var p = polarPoint(cx, cy, maxR, angle);
    return '<line x1="' + cx + '" y1="' + cy + '" x2="' + p.x.toFixed(1) + '" y2="' + p.y.toFixed(1) + '" stroke="#DAD7D3" stroke-width="1"/>';
  }).join('');

  var pPoly = buildPolygonPoints(pValues, cx, cy, maxR);
  var vPoly = buildPolygonPoints(vValues, cx, cy, maxR);

  var labels = CHAPTER_ORDER.map(function(id, i){
    var p = polarPoint(cx, cy, maxR + 22, AXIS_ANGLES[i]);
    return '<text x="' + p.x.toFixed(1) + '" y="' + p.y.toFixed(1) + '" text-anchor="middle" font-size="11" fill="#8D8581" font-family="Noto Sans KR">' + elName(id) + '</text>';
  }).join('');

  return (
    '<svg width="270" height="270" viewBox="0 0 270 270">' +
      gridRings + axisLines +
      '<polygon points="' + pPoly + '" fill="rgba(70,82,77,0.18)" stroke="#46524D" stroke-width="2"/>' +
      '<polygon points="' + vPoly + '" fill="rgba(193,155,113,0.28)" stroke="#B5813F" stroke-width="2"/>' +
      labels +
    '</svg>'
  );
}

function renderRadar(results){
  document.getElementById('radar-holder').innerHTML = buildRadarSVG(results);
}

var CHAKRA_ELEMENT_ORDER = ['ether','air','fire','water','earth'];
var CHAKRA_LABELS = { ether:'공간', air:'바람', fire:'불', water:'물', earth:'흙' };
var CHAKRA_POSITIONS = { ether:31.9, air:44.9, fire:58.6, water:68.4, earth:76.8 };

var CHAKRA_P_COLOR = '#46524D'; /* 본질 (P), 레이더와 동일 */
var CHAKRA_V_COLOR = '#B5813F'; /* 현재/불균형 (V), 레이더와 동일 */

/* doshaKey에 속하는 원소 목록을 반환 (예: 'Vata' -> [ether, air], 'Vata_Pitta' -> [ether,air,fire,water]) */
function getDoshaElements(doshaKey){
  if (doshaKey === 'VPK_Balance') return CHAPTER_ORDER.slice();
  var doshaParts = doshaKey.split('_');
  return CHAPTER_ORDER.filter(function(elId){
    return doshaParts.indexOf(ELEMENT_TO_DOSHA[elId]) > -1;
  });
}

function renderChakraView(results){
  var doshaName = DOSHA_DATA[results.doshaKey].name;
  var name = state.name || '오리';
  var concernIds = results.concernList.map(function(c){ return c.elId; });
  var concernNames = results.concernList.map(function(c){ return c.name; });
  var myDoshaElements = getDoshaElements(results.doshaKey);

  var dots = CHAKRA_ELEMENT_ORDER.map(function(elId){
    var isMyDosha = myDoshaElements.indexOf(elId) > -1;
    var isConcern = concernIds.indexOf(elId) > -1;
    var color = (isMyDosha || !isConcern) ? CHAKRA_P_COLOR : CHAKRA_V_COLOR;
    return '<div class="chakra-dot" style="left:50.1%;top:' + CHAKRA_POSITIONS[elId] + '%;background:' + color + ';"></div>';
  }).join('');

  var list = CHAKRA_ELEMENT_ORDER.map(function(elId){
    var isMyDosha = myDoshaElements.indexOf(elId) > -1;
    var isConcern = concernIds.indexOf(elId) > -1;
    var color = (isMyDosha || !isConcern) ? CHAKRA_P_COLOR : CHAKRA_V_COLOR;
    var statusText = isConcern ? '불균형' : (isMyDosha ? '기질' : '안정');
    return (
      '<div class="chakra-list-item">' +
        '<div class="chakra-list-dot" style="background:' + color + ';"></div>' +
        CHAKRA_LABELS[elId] + ' 원소 <span class="chakra-list-status">· ' + statusText + '</span>' +
      '</div>'
    );
  }).join('');

  var summaryText = '나의 본질적 기질: <b style="font-weight:500;">' + doshaName + '</b> · 현재 불균형: <b style="font-weight:500;">' +
    (concernNames.length > 0 ? concernNames.join(', ') : '없음') + '</b>';

  var html =
    '<div class="chakra-dosha-line"><div class="chakra-dosha-dot"></div>' + name + ' 님의 체질은 <b style="font-weight:500;">' + doshaName + '</b> 입니다</div>' +
    '<div class="chakra-figure-wrap">' +
      '<img src="' + CHAKRA_FIGURE_DATA_URI + '" alt="명상 자세" />' +
      dots +
    '</div>' +
    '<div class="chakra-summary-line">' + summaryText + '</div>' +
    '<div class="chakra-list">' + list + '</div>' +
    '<div class="legend" style="margin-top:18px;">' +
      '<div class="legend-item"><div class="legend-swatch" style="background:' + CHAKRA_P_COLOR + '"></div>본질 (P)</div>' +
      '<div class="legend-item"><div class="legend-swatch" style="background:' + CHAKRA_V_COLOR + '"></div>현재 (V)</div>' +
    '</div>';

  document.getElementById('view-chakra').innerHTML = html;
}

/* ---- 결과 화면 하단: 5원소 퍼센트 + 도샤 종합 설명 ---- */

function buildResultDetailInnerHTML(results){
  var dosha = DOSHA_DATA[results.doshaKey];
  var name = state.name || '오리';

  var qualityLabels = ['온도', '무게', '움직임'];

  var percentRows = CHAPTER_ORDER.map(function(elId){
    var el = ELEMENTS.filter(function(e){ return e.id === elId; })[0];
    var pct = Math.max(0, Math.min(100, Math.round(results.elementStats[elId].pPercent)));
    var qualityParts = ELEMENT_INFO[elId].quality.split(',').map(function(s){ return s.trim(); });
    var qualityTags = qualityParts.map(function(part, i){
      var label = qualityParts.length === 3 ? qualityLabels[i] : null;
      return '<span class="result-quality-tag">' + (label ? '<span class="result-quality-label">' + label + '</span>' : '') + part + '</span>';
    }).join('');
    return (
      '<div class="result-percent-row">' +
        '<div class="result-percent-top">' +
          '<div class="result-percent-name">' + el.name + ' 원소</div>' +
          '<div class="result-percent-value">' + pct + '%</div>' +
        '</div>' +
        '<div class="result-percent-bar"><div class="result-percent-fill" style="width:' + pct + '%;background:var(--' + el.color + ');"></div></div>' +
        '<div class="result-quality-row">' + qualityTags + '</div>' +
      '</div>'
    );
  }).join('');

  return (
    '<div class="result-detail-title">5원소 탐구 결과</div>' +
    '<div class="result-percent-list">' + percentRows + '</div>' +

    '<div class="dosha-result-block">' +

function captureElementAsCanvas(el, bgColor){
  /* foreignObjectRendering can silently produce a blank canvas when the page
     uses cross-origin web fonts (e.g. Google Fonts), so we use html2canvas's
     standard rendering path with letterRendering to keep Korean text spacing correct. */
  return html2canvas(el, { backgroundColor:bgColor, scale:2, useCORS:true, letterRendering:true });
}

function isIOSDevice(){
  return /iP(hone|od|ad)/.test(navigator.userAgent);
}

/* iOS Safari blocks window.open() called from inside a Promise/timeout chain
   because it's no longer considered part of the original user gesture.
   So the tab must be opened synchronously in the click handler, then filled
   in later once the image is ready. */
function writeImageToIOSWindow(win, dataURL){
  if (!win) return;
  win.document.open();
  win.document.write(
    '<!doctype html><html><head><meta name="viewport" content="width=device-width,initial-scale=1">' +
    '<style>body{margin:0;background:#111;display:flex;flex-direction:column;align-items:center;font-family:-apple-system,sans-serif;}' +
    'img{max-width:100%;height:auto;display:block;}' +
    'p{color:#fff;font-size:14px;text-align:center;padding:16px 16px 8px;margin:0;}' +
    '.close-btn{margin:8px 0 24px;padding:12px 28px;font-size:15px;font-weight:600;color:#111;background:#fff;border:none;border-radius:999px;-webkit-tap-highlight-color:transparent;}' +
    '</style>' +
    '</head><body><img src="' + dataURL + '"><p>이미지를 길게 눌러 \'사진에 저장\'을 선택하세요</p>' +
    '<button class="close-btn" onclick="window.close()">닫고 돌아가기</button>' +
    '</body></html>'
  );
  win.document.close();
}

function writeErrorToIOSWindow(win, message){
  if (!win) return;
  try {
    win.document.open();
    win.document.write(
      '<!doctype html><html><body style="font-family:-apple-system,sans-serif;padding:24px;color:#333;">' +
      '<p>' + message + '</p>' +
      '<button style="margin-top:16px;padding:12px 28px;font-size:15px;font-weight:600;color:#fff;background:#333;border:none;border-radius:999px;-webkit-tap-highlight-color:transparent;" onclick="window.close()">닫고 돌아가기</button>' +
      '</body></html>'
    );
    win.document.close();
  } catch(e){ /* ignore */ }
}

function downloadFullReport(results, format, btn, iosWin){
  if (typeof html2canvas === 'undefined'){
    alert('다운로드 기능을 불러오지 못했습니다. 인터넷 연결을 확인하고 다시 시도해주세요.');
    if (iosWin) writeErrorToIOSWindow(iosWin, '다운로드 기능을 불러오지 못했습니다.');
    return;
  }
  var name = state.name || '오리';
  var originalLabel = btn.innerHTML;
  btn.innerHTML = format === 'pdf' ? 'PDF 생성 중...' : '이미지 생성 중...';
  btn.disabled = true;

  var holder = document.createElement('div');
  holder.id = 'fullreport-capture';
  holder.style.position = 'fixed';
  holder.style.top = '0';
  holder.style.left = '-9999px';
  holder.innerHTML = buildFullReportCaptureHTML(results);
  document.body.appendChild(holder);

  function cleanup(){
    btn.innerHTML = originalLabel;
    btn.disabled = false;
    document.body.removeChild(holder);
  }

  var doCapture = function(){
    captureElementAsCanvas(holder, '#ECE9E6').then(function(canvas){
    if (format === 'pdf'){
      if (typeof window.jspdf === 'undefined'){
        cleanup();
        alert('PDF 생성 기능을 불러오지 못했습니다. 인터넷 연결을 확인하고 다시 시도해주세요.');
        return;
      }
      var jsPDF = window.jspdf.jsPDF;
      var imgData = canvas.toDataURL('image/png');
      var pdf = new jsPDF({
        orientation: 'portrait',
        unit: 'px',
        format: [canvas.width, canvas.height]
      });
      pdf.addImage(imgData, 'PNG', 0, 0, canvas.width, canvas.height);
      pdf.save('waum_report_' + name + '.pdf');
      cleanup();
    } else if (isIOSDevice()){
      var dataURL = canvas.toDataURL('image/png');
      cleanup();
      if (iosWin){
        writeImageToIOSWindow(iosWin, dataURL);
      } else {
        alert('팝업이 차단되었습니다. 팝업 허용 후 다시 시도해주세요.');
      }
    } else {
      canvas.toBlob(function(blob){
        cleanup();
        if (!blob){
          alert('이미지 생성에 실패했습니다. 다시 시도해주세요.');
          return;
        }
        var url = URL.createObjectURL(blob);
        var link = document.createElement('a');
        link.download = 'waum_report_' + name + '.png';
        link.href = url;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        setTimeout(function(){ URL.revokeObjectURL(url); }, 30000);
      }, 'image/png');
    }
  }).catch(function(err){
    cleanup();
    alert((format === 'pdf' ? 'PDF' : '이미지') + ' 생성 중 문제가 발생했습니다. 다시 시도해주세요.');
    if (iosWin) writeErrorToIOSWindow(iosWin, '이미지 생성 중 문제가 발생했습니다. 다시 시도해주세요.');
  });
  };

  if (document.fonts && document.fonts.ready){
    document.fonts.ready.then(function(){
      setTimeout(doCapture, 50);
    });
  } else {
    setTimeout(doCapture, 300);
  }
}

        document.fonts.ready.then(function(){ setTimeout(runCapture, 50); });
      } else {
        setTimeout(runCapture, 300);
      }
    });
  }

  var imgBtn = document.getElementById('save-report-img-btn');
  if (imgBtn){
    imgBtn.addEventListener('click', function(){
      var iosWin = isIOSDevice() ? window.open('', '_blank') : null;
      downloadFullReport(results, 'image', imgBtn, iosWin);
    });
  }
  var pdfBtn = document.getElementById('save-report-pdf-btn');
  if (pdfBtn){
    pdfBtn.addEventListener('click', function(){
      downloadFullReport(results, 'pdf', pdfBtn);
    });
  }

  var restartBtn = document.getElementById('restart-btn');
  if (restartBtn){
    restartBtn.addEventListener('click', function(){
      state.name = '';
      state.answers = {};
      state.chapterIndex = 0;
      state.questionIndexInChapter = 0;
      render();
    });
  }
}

/* ---- 인트로 이벤트 ---- */

function bindEvents(){
  var nameInput = document.getElementById('name-input');
  var startBtn = document.getElementById('start-btn');
  if (nameInput){
    nameInput.addEventListener('input', function(){
      state.name = nameInput.value.trim();
      startBtn.disabled = state.name.length === 0;
    });
  }
  var inviteStartBtn = document.getElementById('invite-start-btn');
  if (inviteStartBtn){
    inviteStartBtn.addEventListener('click', function(){ showScreen('philosophy'); });
  }
  var philosophyStartBtn = document.getElementById('philosophy-start-btn');
  if (philosophyStartBtn){
    philosophyStartBtn.addEventListener('click', function(){ showScreen('intro'); });
  }
  if (startBtn){
    startBtn.addEventListener('click', function(){
      if (!state.name) return;
      showScreen('survey');
      renderSurveyInner();
    });
  }
  var toInquiryBtn = document.getElementById('to-inquiry-btn');
  if (toInquiryBtn){
    toInquiryBtn.addEventListener('click', function(){ showScreen('inquiry'); });
  }
  var toMethodBtn = document.getElementById('to-method-btn');
  if (toMethodBtn){
    toMethodBtn.addEventListener('click', function(){ showScreen('method'); });
  }
  var restartBtnMethod = document.getElementById('restart-btn-method');
  if (restartBtnMethod){
    restartBtnMethod.addEventListener('click', function(){
      state.name = '';
      state.answers = {};
      state.chapterIndex = 0;
      state.questionIndexInChapter = 0;
      render();
    });
  }
  var viewEnergyBtn = document.getElementById('view-energy-btn');
  if (viewEnergyBtn){
    viewEnergyBtn.addEventListener('click', function(){
      var returnBtn = document.getElementById('result-return-btn');
      if (returnBtn) returnBtn.style.display = 'block';
      showScreen('result');
    });
  }
  var resultReturnBtn = document.getElementById('result-return-btn');
  if (resultReturnBtn){
    resultReturnBtn.addEventListener('click', function(){
      resultReturnBtn.style.display = 'none';
      showScreen('method');
    });
  }
  var tabRadarBtn = document.getElementById('tab-radar-btn');
  var tabChakraBtn = document.getElementById('tab-chakra-btn');
  function switchView(view){
    var radarPanel = document.getElementById('view-radar');
    var chakraPanel = document.getElementById('view-chakra');
    if (radarPanel) radarPanel.classList.toggle('active', view === 'radar');
    if (chakraPanel) chakraPanel.classList.toggle('active', view === 'chakra');
    if (tabRadarBtn) tabRadarBtn.classList.toggle('active', view === 'radar');
    if (tabChakraBtn) tabChakraBtn.classList.toggle('active', view === 'chakra');
  }
  if (tabRadarBtn) tabRadarBtn.addEventListener('click', function(){ switchView('radar'); });
  if (tabChakraBtn) tabChakraBtn.addEventListener('click', function(){ switchView('chakra'); });

  var resultImgBtn = document.getElementById('save-result-img-btn');
  if (resultImgBtn){
    resultImgBtn.addEventListener('click', function(){
      if (!window.results) return;
      var iosWin = isIOSDevice() ? window.open('', '_blank') : null;
      downloadResultPage(window.results, resultImgBtn, iosWin);
    });
  }
}

render();
</script>
</body>
</html>
